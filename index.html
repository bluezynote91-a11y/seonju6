<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>6학년 실시간 업무 대시보드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🖥️ 6학년 학년 운영 실시간 대시보드</h1>
    </header>

    <nav class="quick-links-container">
        <div class="link-row">
            <a href="#" class="btn-dark btn-first" onclick="alert('크롬 우측 상단 점 3개 설정 > 시작 그룹 > 특정 페이지 또는 페이지 모음 열기에 현재 주소를 추가해 주세요.'); return false;">이 홈페이지를 첫화면으로 만드는 방법</a>
            <a href="https://docs.google.com/spreadsheets/d/1BA0n-HEkAwpS4vx_0b40N8KIEyVjqffhOr1bt2r3qEg/edit?usp=sharing" target="_blank" class="btn-dark">6학년 기본(스프레드시트)</a>
            <a href="https://drive.google.com/drive/folders/10xx4PrCNVUs94RSIcmDtx7RR3kRP0H_L" target="_blank" class="btn-dark">수업자료 공유</a>
            <a href="https://drive.google.com/drive/folders/1u8QpOXms9s_CnbnqHmVnd40yi3DG7gpU" target="_blank" class="btn-dark">출결 양식</a>
            <a href="https://docs.google.com/document/d/1Vj9iGzZOZyWOshue-IBJwcVjSTngT-pp3rP1p6SQirU/edit?tab=t.0" target="_blank" class="btn-dark">부장회의</a>
        </div>
    </nav>

    <main class="dashboard-container">
        <section class="board-wrapper">
            <h2>📅 학년 일정</h2>
            <div id="schedule-list" class="content-list"></div>
        </section>

        <section class="board-wrapper">
            <h2>📢 주요 안내사항</h2>
            <div id="notice-list" class="content-list"></div>
        </section>
    </main>

    <footer class="input-area">
        <div class="input-container">
            <form id="schedule-form" class="input-row">
                <span class="label">일정 추가</span>
                <label class="pin-label"><input type="checkbox" id="s-pin">⭐고정</label>
                
                <input type="text" id="s-title" placeholder="일정 제목 (필수)" required>
                <div class="date-group">
                    <input type="date" id="s-start" title="시작일">
                    <span>~</span>
                    <input type="date" id="s-end" title="종료일">
                </div>
                <input type="text" id="s-desc" placeholder="상세 내용 (선택)">
                <button type="submit" class="btn-s" id="btn-submit-s">일정 등록</button>
            </form>

            <form id="notice-form" class="input-row">
                <span class="label">안내 추가</span>
                <label class="pin-label"><input type="checkbox" id="n-pin">⭐고정</label>

                <input type="text" id="n-title" placeholder="안내 제목 (필수)" required>
                <div class="date-group">
                    <input type="date" id="n-start" title="시작일">
                    <span>~</span>
                    <input type="date" id="n-end" title="종료일">
                </div>
                <input type="text" id="n-desc" placeholder="상세 내용 (선택)">
                <button type="submit" class="btn-n" id="btn-submit-n">안내 등록</button>
            </form>
        </div>
    </footer>

    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
